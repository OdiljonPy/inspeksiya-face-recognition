# Общие настройки системы распознавания
recognition:
  model_name: buffalo_l
  det_size: 640            # вход детектора (квадрат)
  width: 960               # ресайз кадра по ширине перед детекцией
  target_fps: 3            # сколько кадров/сек обрабатывать на камеру
  cosine_threshold: 0.5    # порог совпадения (inner product на L2-норм. векторах = cosine)
  min_det_score: 0.5       # минимальная уверенность детекции, чтобы вообще обрабатывать лицо

# Авто-галерея лиц (Этап 4): система сама присваивает каждому новому лицу
# уникальный ID, сохраняет снимок один раз и узнаёт человека при повторной встрече.
gallery:
  dir: data/gallery               # сюда: faces/<ID>.jpg, embeddings.npy, owners.npy, meta.json
  # Двухпороговая логика (борьба с дублями ID при повороте головы):
  match_threshold: 0.50           # score >= -> точно тот же ID (строже: меньше ложных склеек разных людей)
  new_id_threshold: 0.40          # новый ID только если ближайший score < этого (иначе серая зона -> старый ID)
  max_embeddings_per_id: 8        # сколько ракурсов (эмбеддингов) копить на один ID
  add_embedding_below: 0.9        # добавлять новый ракурс, если score в [match_threshold, add_embedding_below)
  crop_margin: 0.25               # поля вокруг лица при сохранении снимка
  # Гейт качества для создания НОВОГО ID (профиль/смаз не плодят дубли):
  new_id_min_det_score: 0.6       # минимальная уверенность детекции
  new_id_min_face_px: 60          # минимальный размер лица по стороне, px
  new_id_min_frontality: 0.5      # фронтальность по ключевым точкам: 1=анфас, 0=профиль
  new_id_min_blur: 30.0           # резкость (variance of Laplacian); 0 = выключить проверку
  new_id_confirm_frames: 3        # сколько кадров кандидат должен продержаться, прежде чем завести ID
  # Трекинг по камере (держит ID между кадрами):
  track_iou: 0.3                  # порог пересечения боксов для связывания кадров
  track_max_misses: 5             # через сколько пропущенных кадров забывать трек

gpu:
  ctx_id: 0                # 0 -> GPU(0), -1 -> CPU

paths:
  known_faces: data/known_faces   # фото известных людей: <Имя>/*.jpg
  index_dir: data/index           # сюда пишутся faiss.index и labels.json
  snapshots: data/snapshots       # снимки лиц событий (Этап 4)
  plates: data/plates             # кропы номеров (ANPR)
  db: data/events.db              # SQLite (всё runtime-состояние под data/ — удобно для Docker-тома)

# Модуль ANPR (распознавание автомобильных номеров) на fast-alpr.
anpr:
  detector_model: yolo-v9-t-640-license-plate-end2end   # YOLO-детектор номера (640 — баланс точность/скорость)
  ocr_model: global-plates-mobile-vit-v2-model          # OCR: латиница, мульти-регион (подходит для РУз)
  detector_conf: 0.40          # порог уверенности детектора номера
  min_ocr_confidence: 0.50     # минимальная средняя уверенность OCR, чтобы логировать событие
  device: auto                 # auto|cuda|cpu (cuda -> sm_120 через gpu_setup, как у лиц)
  dedup_seconds: 30            # анти-дребезг: один номер на камере не чаще раза в N сек
  # Узбекский формат: регион 01–99 (реально встречаются и 95) + латиница/цифры.
  # Нормализатор: UPPER без пробелов/дефисов.
  # Покрывает частные форматы "01A123BC" (рег+буква+3цифры+2буквы) и "01123ABC" (рег+3цифры+3буквы).
  # При необходимости поправь шаблон под другие серии (такси, гос. и т.п.).
  plate_regex: '^(0[1-9]|[1-9][0-9])([A-Z][0-9]{3}[A-Z]{2}|[0-9]{3}[A-Z]{3})$'

# Анти-дребезг событий (Этап 4): не логировать одного человека на одной
# камере чаще, чем раз в N секунд.
events:
  dedup_seconds: 30
