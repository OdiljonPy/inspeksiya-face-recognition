# Конфигурация камер стройплощадки (10 шт.).
# Заполни поле rtsp реальными адресами. id — уникальный, zone — название зоны.
# mode — какие модули запускать на камере:
#   face  — только распознавание лиц
#   plate — только распознавание автономеров (ANPR)
#   both  — и лица, и номера
# Если mode не указан — по умолчанию "face" (старое поведение не ломается).
#
# Per-camera качество/нагрузка (необязательные, дефолты из settings.yaml):
#   det_size — вход детектора лиц: 640 (ближние, быстро) / 1280–1600 (дальние 4K, точнее, дороже)
#   fps      — сколько кадров/сек обрабатывать на этой камере (2–4)
#   width    — ресайз кадра по ширине перед детекцией (0/не указано = без ресайза)
#   roi      — [x1, y1, x2, y2] в пикселях ИСХОДНОГО кадра: обрабатывать только эту зону
#              (проход/ворота). Кроп подаётся и в лица, и в ANPR. Даёт мелким лицам больше
#              эффективных пикселей детектора при меньшем det_size. Подобрать по стоп-кадру
#              из debug_stream. Пример: roi: [800, 300, 2600, 1500]
# Дальним 4K-камерам ставь det_size повыше; бюджет GPU проверяй debug_stream'ом.
#
# Примеры RTSP по вендорам:
#   Dahua/EZIP : rtsp://user:pass@IP:554/cam/realmonitor?channel=1&subtype=0   (subtype=1 — субпоток, легче)
#   Hikvision  : rtsp://user:pass@IP:554/Streaming/Channels/101                (…/102 — субпоток)
#   Generic    : rtsp://user:pass@IP:554/live
#
# Твоя проверенная камера (раскомментируй, чтобы протестировать на реальном потоке):
#   - id: cam01
#     zone: "Тест"
#     rtsp: "rtsp://192.168.100.133/live"

